{% extends "base.html" %}
{% block title %}JD Match Results - TalentBeacon{% endblock %}
{% block content %}
<h2 class="page-title">Matched Candidates</h2>
<div class="panel-card mb-4">
    <div class="row g-3 align-items-end">
        <div class="col-md-4">
            <label class="form-label">Search</label>
            <input id="searchInput" class="form-control" placeholder="Name, email, skill, education">
        </div>
        <div class="col-md-2">
            <label class="form-label">Skill Filter</label>
            <input id="skillInput" class="form-control" placeholder="Python">
        </div>
        <div class="col-md-2">
            <label class="form-label">Min Score</label>
            <input id="scoreInput" type="number" class="form-control" value="0" min="0" max="100">
        </div>
        <div class="col-md-2">
            <label class="form-label">Sort By</label>
            <select id="sortSelect" class="form-select">
                <option value="match_score">Match Score</option>
                <option value="name">Name</option>
                <option value="years_of_experience">Experience</option>
                <option value="education_level">Education</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100" onclick="loadMatches()">Apply</button>
        </div>
    </div>
</div>

<div class="panel-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Results</h5>
        <span class="badge bg-secondary" id="resultCount">{{ matches|length }} candidates</span>
    </div>
    <div id="resultsTable">
        <p class="text-muted">Loading matches...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const jdUploadId = {{ jd_upload_id }};

async function loadMatches() {
    const params = new URLSearchParams({
        search: document.getElementById('searchInput').value,
        skill: document.getElementById('skillInput').value,
        min_score: document.getElementById('scoreInput').value || '0',
        sort_by: document.getElementById('sortSelect').value,
        direction: 'desc'
    });
    const res = await fetch(`/api/jd-matches/${jdUploadId}?${params}`);
    const data = await res.json();
    renderMatches(data.matches || []);
}

function renderMatches(matches) {
    document.getElementById('resultCount').textContent = `${matches.length} candidates`;
    const el = document.getElementById('resultsTable');
    if (!matches.length) {
        el.innerHTML = '<p class="text-muted">No candidates match the selected filters.</p>';
        return;
    }
    el.innerHTML = `<div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr>
            <th>Rank</th><th>Name</th><th>Email</th><th>Experience</th><th>Education</th><th>Skills</th><th>Match</th>
        </tr></thead>
        <tbody>${matches.map((m, i) => {
            const skills = (m.skills || '').split(';').filter(Boolean).slice(0, 8).map(s => `<span class="badge bg-light text-dark border me-1">${s}</span>`).join('');
            return `<tr>
                <td>${i + 1}</td>
                <td><strong>${m.name || 'Candidate'}</strong><div class="small text-muted">${m.designation || ''}</div></td>
                <td>${m.email || '-'}</td>
                <td>${m.years_of_experience || 0} yrs</td>
                <td>${m.education_level || 'Unknown'}</td>
                <td class="small">${skills}</td>
                <td><span class="badge bg-success fs-6">${Number(m.match_score || 0).toFixed(1)}%</span></td>
            </tr>`;
        }).join('')}</tbody></table></div>`;
}

['searchInput', 'skillInput', 'scoreInput', 'sortSelect'].forEach(id => {
    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', loadMatches);
    });
});
document.addEventListener('DOMContentLoaded', loadMatches);
</script>
{% endblock %}
